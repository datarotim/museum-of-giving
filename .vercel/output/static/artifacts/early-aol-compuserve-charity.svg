<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a25;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:white;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:white;stop-opacity:0" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)" />
  
  <!-- Subtle shine overlay -->
  <rect width="800" height="300" fill="url(#shine)" />
  
  <!-- Outer frame -->
  <rect x="16" y="16" width="768" height="568" rx="4" ry="4" 
        fill="none" stroke="#4a4a6a" stroke-width="1" opacity="0.5" />
  
  <!-- Inner frame -->
  <rect x="32" y="32" width="736" height="536" rx="2" ry="2" 
        fill="none" stroke="#3a3a55" stroke-width="0.5" opacity="0.3" />
  
  <!-- Decorative line top -->
  <line x1="100" y1="180" x2="700" y2="180" stroke="#6a6a8a" stroke-width="0.5" opacity="0.2" />
  
  <!-- Year -->
  <text x="400" y="310" font-family="Georgia, 'Times New Roman', serif" 
        font-size="120" font-weight="bold" fill="#d0d0e0" 
        text-anchor="middle" opacity="0.85">1993</text>
  
  <!-- Decorative line bottom -->
  <line x1="200" y1="340" x2="600" y2="340" stroke="#6a6a8a" stroke-width="0.5" opacity="0.3" />
  
  <!-- Org name -->
  <text x="400" y="390" font-family="Georgia, 'Times New Roman', serif" 
        font-size="22" fill="#a0a0c0" 
        text-anchor="middle" opacity="0.9">Various</text>
  
  <!-- Small museum label -->
  <text x="400" y="540" font-family="Georgia, 'Times New Roman', serif" 
        font-size="11" fill="#6a6a8a" letter-spacing="3"
        text-anchor="middle" opacity="0.35">MUSEUM OF GIVING</text>
</svg>